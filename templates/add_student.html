{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0">Add New Student</h4>
            </div>
            <div class="card-body">
                <form action="{{ url_for('add_student') }}" method="POST" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label for="name" class="form-label">Full Name</label>
                        <input type="text" class="form-control" id="name" name="name" required placeholder="Enter student's full name">
                    </div>
                    <div class="mb-3">
                        <label for="class" class="form-label">Class / Grade</label>
                        <input type="text" class="form-control" id="class" name="class" required placeholder="e.g. 5-A">
                    </div>
                    <div class="mb-3">
                        <label for="birthday" class="form-label">Birthday</label>
                        <input type="date" class="form-control" id="birthday" name="birthday" required>
                    </div>
                    <div class="mb-3">
                        <label for="father_name" class="form-label">Father's Name</label>
                        <input type="text" class="form-control" id="father_name" name="father_name" placeholder="Enter father's name">
                    </div>
                    <div class="mb-3">
                        <label for="contact_number_1" class="form-label">Contact Number 1</label>
                        <input type="tel" class="form-control" id="contact_number_1" name="contact_number_1" placeholder="e.g. 9876543210">
                    </div>
                    <div class="mb-3">
                        <label for="contact_number_2" class="form-label">Contact Number 2</label>
                        <input type="tel" class="form-control" id="contact_number_2" name="contact_number_2" placeholder="e.g. 9876543210">
                    </div>
                    <div class="mb-3">
                        <label for="corrections" class="form-label">Corrections</label>
                        <textarea class="form-control" id="corrections" name="corrections" rows="2" placeholder="Any corrections or notes"></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="parent_phone" class="form-label">Parent WhatsApp Number</label>
                        <input type="tel" class="form-control" id="parent_phone" name="parent_phone" placeholder="e.g. +919876543210">
                        <div class="form-text">Optional. Used by Twilio WhatsApp when sending posters.</div>
                    </div>
                    <div class="mb-3">
                        <label for="photo" class="form-label">Student Photo</label>
                        <input type="file" class="form-control" id="photo" name="photo" accept="image/*">
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-success">Save Student Details</button>
                        <a href="{{ url_for('index') }}" class="btn btn-light">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
