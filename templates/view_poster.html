{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 text-center">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Birthday Poster for {{ student.name }}</h4>
            </div>
            <div class="card-body">
                <div class="mb-4">
                    <img src="{{ poster_url }}" class="img-fluid border" alt="Birthday Poster" style="max-height: 600px;">
                </div>
                <div class="alert alert-info">
                    <strong>AI Generated Quote:</strong><br>
                    "{{ quote }}"
                </div>
                <div class="d-grid gap-2 d-md-flex justify-content-md-center mb-3">
                    <button class="btn btn-success me-md-2" onclick="window.print()">Download / Print</button>
                    <a href="https://wa.me/?text=Happy Birthday {{ student.name }}! Check out your poster here!" target="_blank" class="btn btn-primary">Share on WhatsApp</a>
                </div>
                <hr>
                <form action="{{ url_for('email_poster', student_id=student.id) }}" method="POST" class="mt-3">
                    <div class="input-group">
                        <input type="email" name="email" class="form-control" placeholder="Recipient Email Address" required>
                        <input type="hidden" name="poster_filename" value="{{ poster_url | basename }}">
                        <button class="btn btn-outline-secondary" type="submit">📧 Email Poster</button>
                    </div>
                </form>
                <div class="mt-3">
                    <a href="{{ url_for('index') }}" class="btn btn-secondary">Back to Dashboard</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
