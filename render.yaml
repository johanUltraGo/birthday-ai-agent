services:
  - type: web
    name: birthday-ai-agent
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: GEMINI_API_KEY
        sync: false # Set this in the Render Dashboard
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: birthday-db
          property: connectionString
      - key: DATA_DIR
        value: /data
    disk:
      name: birthday-data
      mountPath: /data
      sizeGB: 1

databases:
  - name: birthday-db
    plan: free # Use 'free' for the free tier
    # Note: Persistent Disks are a paid feature on Render. 
    # If you are on the Free tier, use Render Managed PostgreSQL for the database
    # and an external service like Cloudinary for image persistence.
